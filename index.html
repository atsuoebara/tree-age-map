<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>樹齢マップ</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
}
header {
  padding: 16px;
  background: #1f7a3a;
  color: white;
}
#map {
  width: 100%;
  height: 80vh;
}
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>
<body>

<header>
  <h1>🌳 樹齢マップ</h1>
  <p>日本全国の巨樹・名木を集めるプロジェクト</p>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([36.3912, 139.0609], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

L.marker([36.3912, 139.0609])
  .addTo(map)
  .bindPopup('🌳 サンプル地点：群馬県');
</script>

</body>
</html>
